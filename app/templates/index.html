<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>AI phân tích lá cải - VGG16 + CBAM</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="page">
      <div class="sidebar">
        <h1 class="logo">LeafCare AI</h1>
        <p class="subtitle">VGG16 + CBAM<br />Phân tích ảnh lá cải</p>
        <div class="hint-box">
          <p><strong>Gợi ý câu hỏi</strong></p>
          <ul>
            <li>Ảnh này lá có khỏe không?</li>
            <li>Vì sao lá bị vàng?</li>
            <li>Cần chăm sóc như thế nào?</li>
          </ul>
        </div>
      </div>

      <main class="chat-area">
        <div id="messages" class="messages">
          <div class="message bot">
            <div class="avatar">AI</div>
            <div class="bubble">
              <p>
                Xin chào 👋. Hãy tải lên một <strong>ảnh lá cải</strong>, mình sẽ phân tích
                tình trạng lá (khỏe, vàng, sâu, sâu + vàng) dựa trên mô hình
                <strong>VGG16 + CBAM</strong>.
              </p>
            </div>
          </div>
        </div>

        <form id="upload-form" class="input-bar">
          <label class="file-input">
            <input id="file" type="file" accept="image/*" />
            <span>Chọn ảnh</span>
          </label>
          <button type="submit" class="send-btn">Gửi</button>
        </form>
      </main>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
